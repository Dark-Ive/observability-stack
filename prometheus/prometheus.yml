global:
  scrape_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'custom_exporter'
    static_configs:
      - targets: ['custom-exporter:8000']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
